# Managed by EasyNginx — https://github.com/nerkoux/EasyNGINX
# Domain: {{ domain }}
# Type:   redirect

server {
    listen 80;
    listen [::]:80;
    server_name {{ domain }};

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        try_files $uri =404;
    }

    location / {
        return 301 {{ redirect_to }}$request_uri;
    }
}
