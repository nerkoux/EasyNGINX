# Managed by EasyNginx — https://github.com/nerkoux/EasyNGINX
# Domain: {{ domain }}
# Type:   reverse-proxy

{% if rate_limit %}
limit_req_zone $binary_remote_addr zone=easy_{{ zone_id }}:10m rate=20r/s;
{% endif %}

server {
    listen 80;
    listen [::]:80;
    server_name {{ domain }};

    # ACME / Let's Encrypt http-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        try_files $uri =404;
    }

    {% if gzip %}
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/javascript application/json application/xml
        text/css text/plain text/xml image/svg+xml;
    {% endif %}

    {% if security_headers %}
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;
    {% endif %}

    {% if basic_auth %}
    auth_basic "Restricted";
    auth_basic_user_file {{ basic_auth_file }};
    {% endif %}

    client_max_body_size 25m;

    location / {
        {% if rate_limit %}
        limit_req zone=easy_{{ zone_id }} burst=40 nodelay;
        {% endif %}

        proxy_pass {{ upstream }};
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}
