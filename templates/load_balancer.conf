# Managed by EasyNginx — https://github.com/nerkoux/EasyNGINX
# Domain: {{ domain }}
# Type:   load-balancer

upstream easy_{{ zone_id }} {
    {{ upstream_block }}
    keepalive 32;
}

{% if rate_limit %}
limit_req_zone $binary_remote_addr zone=easy_{{ zone_id }}:10m rate=20r/s;
{% endif %}

server {
    listen 80;
    listen [::]:80;
    server_name {{ domain }};

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        try_files $uri =404;
    }

    {% if gzip %}
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_vary on;
    gzip_types application/javascript application/json text/css text/plain;
    {% endif %}

    {% if security_headers %}
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    {% endif %}

    client_max_body_size 25m;

    location / {
        {% if rate_limit %}
        limit_req zone=easy_{{ zone_id }} burst=40 nodelay;
        {% endif %}

        proxy_pass http://easy_{{ zone_id }};
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }
}
