<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Be right back</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font: 16px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
      max-width: 520px;
      margin: 14vh auto 0;
      padding: 0 24px;
      color: #1a1a1a;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0e1114; color: #e6e8ea; }
      a { color: #6ee7a8; }
    }
    h1 { font-weight: 600; letter-spacing: -0.01em; }
    p { color: #555; }
    @media (prefers-color-scheme: dark) { p { color: #aab1ba; } }
    .dot {
      display: inline-block; width: 8px; height: 8px;
      background: #f59e0b; border-radius: 50%;
      margin-right: 8px; vertical-align: middle;
    }
  </style>
</head>
<body>
  <h1><span class="dot"></span>We'll be right back</h1>
  <p>This site is undergoing scheduled maintenance.</p>
  <p>Thanks for your patience.</p>
</body>
</html>
